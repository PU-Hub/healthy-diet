services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diet-api-server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/diet_db
      - YOLO_SCRIPT_PATH=/app/yolo_scripts/predict.py
      - RUST_LOG=info
    volumes:
      - ./uploads:/app/uploads
      - ../health-diet-yolo:/app/yolo_scripts
