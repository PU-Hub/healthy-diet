openapi: 3.0.3
info:
  title: Healthy Diet API
  version: 1.0.0
  description: API specification synchronized with current Axum routes.
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: System
  - name: Authentication
  - name: Users
  - name: Nutrition
  - name: Diet
  - name: Chat
  - name: Admin

paths:
  /:
    get:
      tags: [System]
      summary: Root health text
      operationId: root
      responses:
        '200':
          description: Connect success message
          content:
            text/plain:
              schema:
                type: string
                example: Connect Success!

  /ping:
    get:
      tags: [System]
      summary: Ping server
      operationId: ping
      responses:
        '200':
          description: Meme-style ping text
          content:
            text/plain:
              schema:
                type: string

  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /auth/discord/login:
    get:
      tags: [Authentication]
      summary: Redirect to Discord OAuth login
      operationId: discordLogin
      responses:
        '307':
          description: Temporary redirect to Discord OAuth authorize URL

  /auth/discord/callbck:
    get:
      tags: [Authentication]
      summary: Discord OAuth callback
      operationId: discordCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Discord login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordLoginResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPayload'
      responses:
        '200':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenPayload'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid/expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile:
    get:
      tags: [Users]
      summary: Get profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfilePayload'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consult:
    post:
      tags: [Nutrition]
      summary: Ask AI nutrition consult
      operationId: consult
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsultRequest'
      responses:
        '200':
          description: AI reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsultResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server/AI error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diet:
    post:
      tags: [Diet]
      summary: Analyze diet image with YOLO and AI scoring
      operationId: analyzeDiet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalorieResponse'
        '400':
          description: Invalid upload/image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: YOLO/AI/server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diet_record:
    get:
      tags: [Diet]
      summary: Get latest diet records (max 30)
      operationId: getDietRecords
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Diet records list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DietRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /diet_image:
    post:
      tags: [Diet]
      summary: Get analyzed image by record id
      description: Requires bearer token, or `Authorization: Bearer <N8N_SECRET_KEY>` for n8n integration.
      operationId: getDietImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageRequest'
      responses:
        '200':
          description: Base64 image payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden or record not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Image/record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /record:
    post:
      tags: [System]
      summary: Record a site visit for current date
      operationId: recordVisit
      responses:
        '200':
          description: Visit recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Visit recorded successfully
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /month_stats:
    get:
      tags: [System]
      summary: Get daily visit counts of latest 30 days
      operationId: getMonthStats
      responses:
        '200':
          description: Daily stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyStatsResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /proxy_chat_check:
    get:
      tags: [Chat]
      summary: Check downstream chat agent availability
      operationId: proxyChatCheck
      responses:
        '200':
          description: Agent is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'
        '500':
          description: Missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'
        '503':
          description: Agent unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'

  /proxy_chat:
    post:
      tags: [Chat]
      summary: Proxy chat request to agent service (SSE)
      operationId: proxyChat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"type\":\"answer\",\"content\":\"...\"}\n\n"
        '400':
          description: Invalid image format/payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server or downstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /agent_approve:
    post:
      tags: [Admin]
      summary: Approve or reject downstream agent action
      operationId: approveAgent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentApproveRequest'
      responses:
        '200':
          description: Pass-through JSON from downstream service
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server/downstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat_rooms:
    get:
      tags: [Chat]
      summary: Get chat room list
      operationId: getChatRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chat rooms
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat_room_titles:
    get:
      tags: [Chat]
      summary: Get chat room titles and summaries
      operationId: getChatRoomTitles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chat room title list
          content:
            application/json:
              schema:
                type: object
                properties:
                  rooms:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatRoomTitleItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /room_history/{room_id}:
    get:
      tags: [Chat]
      summary: Get room history messages
      operationId: getRoomHistory
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: room_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: History list
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatMessage'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /room_history/{room_id}/index/{index}:
    get:
      tags: [Chat]
      summary: Get specific room history detail by index
      operationId: getRoomHistoryByIndex
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: room_id
          required: true
          schema:
            type: string
        - in: path
          name: index
          required: true
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: History detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    $ref: '#/components/schemas/RoomHistoryDetailResponse'
        '400':
          description: Invalid index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Index out of range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserProfile:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true

    AuthResponse:
      type: object
      required: [token, refreshToken, expiresIn, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserProfile'

    RegisterPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          minLength: 2
          maxLength: 20
          nullable: true
        avatar_url:
          type: string
          nullable: true

    LoginPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenPayload:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AiConsultationRecord:
      type: object
      required: [id, question, ai_response, created_at]
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
        ai_response:
          type: string
        created_at:
          type: string

    UserDetailResponse:
      type: object
      required: [id, email, aiConsultations]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        height:
          type: number
          format: double
          nullable: true
        weight:
          type: number
          format: double
          nullable: true
        age:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        taboo:
          type: array
          nullable: true
          items:
            type: string
        disease:
          type: array
          nullable: true
          items:
            type: string
        aiConsultations:
          type: array
          items:
            $ref: '#/components/schemas/AiConsultationRecord'

    UpdateProfilePayload:
      type: object
      properties:
        nickname:
          type: string
          nullable: true
        height:
          type: number
          format: double
          nullable: true
        weight:
          type: number
          format: double
          nullable: true
        age:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        taboo:
          type: array
          nullable: true
          items:
            type: string
        disease:
          type: array
          nullable: true
          items:
            type: string

    ConsultRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string

    ConsultResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string

    FoodItem:
      type: object
      required: [class, confidence, estimated_weight_g, calories]
      properties:
        class:
          type: string
        confidence:
          type: number
          format: double
        estimated_weight_g:
          type: number
          format: double
        calories:
          type: number
          format: double

    CalorieResponse:
      type: object
      required: [message, total_calories, detected_items, ai_score, ai_comment]
      properties:
        message:
          type: string
        total_calories:
          type: number
          format: double
        detected_items:
          type: array
          items:
            $ref: '#/components/schemas/FoodItem'
        image_base64:
          type: string
          nullable: true
        ai_score:
          type: integer
        ai_comment:
          type: string

    DietRecordResponse:
      type: object
      required: [id, created_at, total_calories]
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
        total_calories:
          type: number
          format: double
        grain_calories:
          type: number
          format: double
          nullable: true
        grain_area:
          type: number
          format: double
          nullable: true
        protein_meat_calories:
          type: number
          format: double
          nullable: true
        protein_meat_area:
          type: number
          format: double
          nullable: true
        protein_bean_calories:
          type: number
          format: double
          nullable: true
        protein_bean_area:
          type: number
          format: double
          nullable: true
        vegetable_calories:
          type: number
          format: double
          nullable: true
        vegetable_area:
          type: number
          format: double
          nullable: true
        fruit_calories:
          type: number
          format: double
          nullable: true
        fruit_area:
          type: number
          format: double
          nullable: true
        dairy_calories:
          type: number
          format: double
          nullable: true
        dairy_area:
          type: number
          format: double
          nullable: true
        nuts_calories:
          type: number
          format: double
          nullable: true
        nuts_area:
          type: number
          format: double
          nullable: true
        ai_health_score:
          type: integer
          nullable: true
        ai_evaluation:
          type: string
          nullable: true

    ImageRequest:
      type: object
      required: [record_id]
      properties:
        record_id:
          type: string
          format: uuid

    ImageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        image_base64:
          type: string
          nullable: true
        original_image_base64:
          type: string
          nullable: true

    DailyStatsResponse:
      type: object
      required: [date, visit_count]
      properties:
        date:
          type: string
        visit_count:
          type: integer

    ProxyChatCheckResponse:
      type: object
      required: [pingUrl, pingOk, proxyChatAvailable]
      properties:
        pingUrl:
          type: string
        pingOk:
          type: boolean
        proxyChatAvailable:
          type: boolean
        pingStatusCode:
          type: integer
          nullable: true
        pingResponse:
          type: string
          nullable: true

    AgentChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        room_id:
          type: string
          format: uuid
          nullable: true
        user_context:
          type: object
          nullable: true
          additionalProperties: true
        image:
          type: string
          nullable: true
          description: Absolute path, base64, or data URL image payload

    AgentApproveRequest:
      type: object
      required: [approve_id, action]
      properties:
        approve_id:
          type: string
        action:
          type: string
          enum: [approve, reject]

    RoomResponse:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
        title:
          type: string
        last_updated:
          type: string
          format: date-time
          nullable: true

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          example: user
        content:
          type: string
        image_path:
          type: string
          nullable: true
        image_base64:
          type: string
          nullable: true

    ChatRoomTitleItem:
      type: object
      required: [roomId, title, summary]
      properties:
        roomId:
          type: string
        title:
          type: string
        summary:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        lastMessageAt:
          type: string
          format: date-time
          nullable: true

    RoomHistoryDetailResponse:
      type: object
      required: [id, roomId, userId, index]
      properties:
        id:
          type: string
          format: uuid
        roomId:
          type: string
        userId:
          type: string
          format: uuid
        index:
          type: integer
          format: int64
        userMessage:
          type: string
          nullable: true
        imagePath:
          type: string
          nullable: true
        imageBase64:
          type: string
          nullable: true
        aiAnalysisReport:
          type: string
          nullable: true
        dietReport:
          type: object
          nullable: true
          additionalProperties: true
        title:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        summaryUpdatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true

    HealthResponse:
      type: object
      required: [status]
      properties:
