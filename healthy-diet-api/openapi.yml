openapi: 3.0.3
info:
  title: Healthy Diet API
  version: 1.0.0
  description: API specification synchronized with current Axum routes.
servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: System
  - name: Authentication
  - name: Users
  - name: Diet
  - name: Chat
  - name: Knowledge
  - name: Admin

paths:
  /:
    get:
      tags: [System]
      summary: Root health text
      operationId: root
      responses:
        '200':
          description: Connect success message
          content:
            text/plain:
              schema:
                type: string
                example: Connect Success!

  /openapi.yml:
    get:
      tags: [System]
      summary: Get OpenAPI YAML document
      operationId: getOpenApiYaml
      responses:
        '200':
          description: OpenAPI specification in YAML format
          content:
            application/yaml:
              schema:
                type: string

  /api/ping:
    get:
      tags: [System]
      summary: Ping server
      operationId: ping
      responses:
        '200':
          description: Meme-style ping text
          content:
            text/plain:
              schema:
                type: string

  /api/health:
    get:
      tags: [System]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/gemma4/health:
    get:
      tags: [System]
      summary: Check local Gemma4 service reachability
      operationId: gemma4HealthCheck
      responses:
        '200':
          description: Gemma4 service is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gemma4HealthResponse'
        '503':
          description: Gemma4 service is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Gemma4HealthResponse'

  /auth/discord/login:
    get:
      tags: [Authentication]
      summary: Redirect to Discord OAuth login
      operationId: discordLogin
      responses:
        '307':
          description: Temporary redirect to Discord OAuth authorize URL

  /auth/discord/callbck:
    get:
      tags: [Authentication]
      summary: Discord OAuth callback
      operationId: discordCallback
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Discord login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscordLoginResponse'

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPayload'
      responses:
        '200':
          description: Register success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/admin/login:
    post:
      tags: [Authentication]
      summary: Login as admin/operator
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPayload'
      responses:
        '200':
          description: Admin login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenPayload'
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid/expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/user/profile:
    get:
      tags: [Users]
      summary: Get profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfilePayload'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/diet:
    post:
      tags: [Diet]
      summary: Analyze diet image with YOLO and AI scoring
      operationId: analyzeDiet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalorieResponse'
        '400':
          description: Invalid upload/image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: YOLO/AI/server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/diet_record:
    get:
      tags: [Diet]
      summary: Get latest diet records (max 30)
      operationId: getDietRecords
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Diet records list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DietRecordResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/diet_image:
    post:
      tags: [Diet]
      summary: Get analyzed image by record id
      description: Requires bearer token.
      operationId: getDietImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageRequest'
      responses:
        '200':
          description: Base64 image payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden or record not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Image/record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/record:
    post:
      tags: [System]
      summary: Record a site visit for current date
      operationId: recordVisit
      responses:
        '200':
          description: Visit recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Visit recorded successfully
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/month_stats:
    get:
      tags: [System]
      summary: Get daily visit counts of latest 30 days
      operationId: getMonthStats
      responses:
        '200':
          description: Daily stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DailyStatsResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/chat_check:
    get:
      tags: [Chat]
      summary: Check downstream chat agent availability
      operationId: chatCheck
      responses:
        '200':
          description: Agent is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'
        '500':
          description: Missing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'
        '503':
          description: Agent unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProxyChatCheckResponse'

  /api/chat:
    post:
      tags: [Chat]
      summary: Proxy chat request to agent service (SSE)
      operationId: chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatRequest'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"type\":\"answer\",\"content\":\"...\"}\n\n"
        '400':
          description: Invalid image format/payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server or downstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/approve:
    post:
      tags: [Admin]
      summary: Approve or reject downstream agent action
      operationId: approveAgent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentApproveRequest'
      responses:
        '200':
          description: Pass-through JSON from downstream service
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server/downstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/announcements/current:
    get:
      tags: [Knowledge]
      summary: Get the latest published public announcement
      operationId: getCurrentAnnouncement
      responses:
        '200':
          description: Current published announcement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentAnnouncementResponse'
        '404':
          description: No published announcement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/news/sync:
    post:
      tags: [Knowledge]
      summary: Trigger downstream FDA news sync
      operationId: newsSync
      responses:
        '200':
          description: News sync result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsSyncResponse'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/news:
    get:
      tags: [Knowledge]
      summary: Get paginated local news list
      operationId: listNews
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            format: int64
            minimum: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: News list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/news/{id}:
    get:
      tags: [Knowledge]
      summary: Get one local news article
      operationId: getNewsDetail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: News detail response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsDetailResponse'
        '404':
          description: News entry or file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/news-files:
    get:
      tags: [Knowledge]
      summary: List local news markdown files
      operationId: listNewsFiles
      responses:
        '200':
          description: News file list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsFilesResponse'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/rag/search:
    get:
      tags: [Knowledge]
      summary: Search local knowledge corpus
      operationId: ragSearchGet
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
        - in: query
          name: top_k
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 12
        - in: query
          name: force_refresh
          schema:
            type: boolean
      responses:
        '200':
          description: RAG search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagSearchResponse'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Knowledge]
      summary: Search local knowledge corpus with source filters
      operationId: ragSearchPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagSearchRequest'
      responses:
        '200':
          description: RAG search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagSearchResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagSearchValidationError'
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/knowledge-graph/status:
    get:
      tags: [Knowledge]
      summary: Get global knowledge graph readiness and counts
      description: Public Rust-facing endpoint for frontend clients. This route proxies the downstream agent route `/api/graph/status` and returns global graph readiness plus aggregate counts.
      operationId: knowledgeGraphStatus
      responses:
        '200':
          description: Knowledge graph global status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphStatusResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/knowledge-graph/nodes:
    get:
      tags: [Knowledge]
      summary: List knowledge graph nodes from the global graph cache
      operationId: knowledgeGraphNodes
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: node_type
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
      responses:
        '200':
          description: Knowledge graph node list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphNodesResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/knowledge-graph/query:
    post:
      tags: [Knowledge]
      summary: Query a focused knowledge graph subgraph
      operationId: knowledgeGraphQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeGraphQueryRequest'
      responses:
        '200':
          description: Knowledge graph query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphQueryResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/knowledge-graph/nodes/{node_id}:
    get:
      tags: [Knowledge]
      summary: Get one knowledge graph node with neighbors and evidence
      operationId: knowledgeGraphNodeDetail
      parameters:
        - in: path
          name: node_id
          required: true
          description: URL-encoded node identifier such as `food%3Abroccoli`
          schema:
            type: string
      responses:
        '200':
          description: Knowledge graph node detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphNodeDetailResponse'
        '404':
          description: Node not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/knowledge-graph/relations/{relation_id}/evidence:
    get:
      tags: [Knowledge]
      summary: Get one relation with supporting evidence
      operationId: knowledgeGraphRelationEvidence
      parameters:
        - in: path
          name: relation_id
          required: true
          description: URL-encoded relation identifier such as `food%3Abroccoli%7Ccontains%7Cnutrient%3Afiber`
          schema:
            type: string
      responses:
        '200':
          description: Knowledge graph relation evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphRelationEvidenceResponse'
        '404':
          description: Relation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream service unavailable or invalid response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/me:
    get:
      tags: [Admin]
      summary: Get current admin identity
      operationId: adminMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current admin profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users:
    get:
      tags: [Admin]
      summary: List admin-visible users
      operationId: adminListUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            format: int64
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            format: int64
            minimum: 0
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminUserListItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/{user_id}:
    get:
      tags: [Admin]
      summary: Get one user detail for admin console
      operationId: adminGetUserDetail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
