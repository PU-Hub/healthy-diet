components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserProfile:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
          nullable: true
        avatar_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [user, operator, super_admin]

    AuthResponse:
      type: object
      required: [token, refreshToken, expiresIn, user]
      properties:
        token:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserProfile'

    RegisterPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        nickname:
          type: string
          minLength: 2
          maxLength: 20
          nullable: true
        avatar_url:
          type: string
          nullable: true

    LoginPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshTokenPayload:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UserDetailResponse:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nickname:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        height:
          type: number
          format: double
          nullable: true
        weight:
          type: number
          format: double
          nullable: true
        age:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        taboo:
          type: array
          nullable: true
          items:
            type: string
        disease:
          type: array
          nullable: true
          items:
            type: string

    UpdateProfilePayload:
      type: object
      properties:
        nickname:
          type: string
          nullable: true
        height:
          type: number
          format: double
          nullable: true
        weight:
          type: number
          format: double
          nullable: true
        age:
          type: number
          format: double
          nullable: true
        gender:
          type: string
          nullable: true
        taboo:
          type: array
          nullable: true
          items:
            type: string
        disease:
          type: array
          nullable: true
          items:
            type: string

    FoodItem:
      type: object
      required: [class, confidence, estimated_weight_g, calories]
      properties:
        class:
          type: string
        confidence:
          type: number
          format: double
        estimated_weight_g:
          type: number
          format: double
        calories:
          type: number
          format: double

    CalorieResponse:
      type: object
      required: [message, total_calories, detected_items, ai_score, ai_comment]
      properties:
        message:
          type: string
        total_calories:
          type: number
          format: double
        detected_items:
          type: array
